# Google Cloud Build pipeline
# Builds the LIMS Docker image and deploys to Cloud Run
#
# Required Cloud Build substitution variables (set in trigger):
#   _REGION          : e.g. us-central1
#   _SERVICE_NAME    : e.g. lims-api
#   _GCS_BUCKET      : GCS bucket name for document storage
#   _DB_URL          : Cloud SQL JDBC URL (via Secret Manager recommended)
#   _SUPABASE_URL    : Supabase project URL
#
# Secrets (bind in Cloud Build trigger from Secret Manager):
#   DB_PASSWORD, JWT_SECRET, SUPABASE_ANON_KEY

steps:
  # 1. Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '-f'
      - 'lims-backend/Dockerfile'
      - 'lims-backend'

  # 2. Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=8080'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=300'
      - '--allow-unauthenticated'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID'
      - '--set-env-vars=GCS_BUCKET=${_GCS_BUCKET}'
      - '--set-env-vars=SUPABASE_URL=${_SUPABASE_URL}'
      - '--set-env-vars=APP_ENV=production'
      - '--set-env-vars=LOG_LEVEL_ROOT=INFO'
      - '--set-env-vars=LOG_LEVEL_APP=INFO'
      - '--set-secrets=DB_URL=lims-db-url:latest'
      - '--set-secrets=DB_USERNAME=lims-db-username:latest'
      - '--set-secrets=DB_PASSWORD=lims-db-password:latest'
      - '--set-secrets=JWT_SECRET=lims-jwt-secret:latest'
      - '--set-secrets=SUPABASE_ANON_KEY=lims-supabase-anon-key:latest'
      - '--service-account=lims-api-sa@$PROJECT_ID.iam.gserviceaccount.com'

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
